name: Deploy SecondBrain

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - List project files
      run: |
        echo "=== ROOT FILES ==="
        ls -la
        echo "=== BACKEND FILES ==="
        ls -la backend

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Verify Java & Maven
      run: |
        java -version
        cd backend
        chmod +x mvnw
        ./mvnw -version

    - name: Build JAR
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean package -DskipTests
        echo "=== TARGET FILES ==="
        ls -la target

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Verify AWS Login
      run: |
        aws sts get-caller-identity

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 392749559832.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build Docker Image
      run: |
        cd backend
        docker build --platform linux/amd64 -t secondbrain-backend .
        docker images

    - name: Tag Docker Image
      run: |
        docker tag secondbrain-backend:latest 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest

    - name: Push Docker Image
      run: |
        docker push 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest

    - name: Debug EC2 SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "=== EC2 CONNECTED ==="
          whoami
          pwd
          docker --version
          docker ps -a

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "=== LOGIN TO ECR ==="
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 392749559832.dkr.ecr.ap-south-1.amazonaws.com

          echo "=== STOP OLD CONTAINER ==="
          docker stop secondbrain-backend || true
          docker rm secondbrain-backend || true

          echo "=== PULL NEW IMAGE ==="
          docker pull 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest

          echo "=== RUN CONTAINER ==="
          docker run -d -p 8080:8080 \
            --name secondbrain-backend \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e APP_CORS_ALLOWED_ORIGINS=http://secondbrain-frontend-tanmay.s3-website.ap-south-1.amazonaws.com \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://portfolio-db.cdqei2mkmdor.ap-south-1.rds.amazonaws.com:5432/secondbrain_db \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD='vCpVDwlfkQhYtSSQrEX9' \
            -e SPRING_AI_GOOGLE_GEMINI_API_KEY='AIzaSyDK622J_FZ4nXGjxYCBa5vrwVAhajq8oME' \
            392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest

          echo "=== VERIFY DEPLOYMENT ==="
          docker ps
          docker logs secondbrain-backend --tail 50