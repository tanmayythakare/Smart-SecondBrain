name: Deploy SecondBrain
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GEMINI_KEY: ${{ secrets.SPRING_AI_GOOGLE_GEMINI_API_KEY }}
      DB_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      DB_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      DB_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      CORS_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 392749559832.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and Push Docker Image
        run: |
          cd backend
          docker build --platform linux/amd64 -t secondbrain-backend .
          docker tag secondbrain-backend:latest 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest
          docker push 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-08c038b04f669180e" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy SecondBrain Backend" \
            --parameters commands="[
              \"aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 392749559832.dkr.ecr.ap-south-1.amazonaws.com\",
              \"docker stop secondbrain-backend || true\",
              \"docker rm secondbrain-backend || true\",
              \"docker pull 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest\",
              \"docker run -d -p 8080:8080 --name secondbrain-backend -e SPRING_PROFILES_ACTIVE=prod -e SPRING_AI_GOOGLE_GEMINI_API_KEY=$GEMINI_KEY -e SPRING_AI_GOOGLE_GEMINI_MODEL=gemini-2.0-flash-lite -e SPRING_DATASOURCE_URL=$DB_URL -e SPRING_DATASOURCE_USERNAME=$DB_USERNAME -e SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD -e APP_CORS_ALLOWED_ORIGINS=$CORS_ORIGINS 392749559832.dkr.ecr.ap-south-1.amazonaws.com/secondbrain-backend:latest\",
              \"docker image prune -f\"
            ]" \
            --query "Command.CommandId" \
            --output text)
          echo "Command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id i-08c038b04f669180e