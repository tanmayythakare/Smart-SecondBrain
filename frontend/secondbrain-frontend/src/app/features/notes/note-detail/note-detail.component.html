<div class="note-detail-page" *ngIf="note; else loading">

  <!-- Header -->
  <header class="detail-header">
    <div class="breadcrumb">
      <a routerLink="/notes" class="breadcrumb-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        Notes
      </a>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-current">{{ note.title || 'Untitled' }}</span>
    </div>

    <div class="header-actions">
      <button class="btn-ghost danger-text delete-btn" (click)="deleteNote()">
        <i data-lucide="trash-2"></i>
        <span>Delete Note</span>
      </button>
      <button class="btn-primary save-btn" (click)="saveNote()">
        <i data-lucide="save"></i>
        <span>Save Changes</span>
      </button>
    </div>
  </header>

  <div class="detail-layout">

    <!-- Main Content -->
    <main class="note-main">

      <!-- Title Input -->
      <input type="text" class="note-title-input" [(ngModel)]="note.title" placeholder="Note title..." />

      <!-- Content Textarea -->
      <textarea class="note-content-input" [(ngModel)]="note.content" placeholder="Start writing your note..."
        rows="20"></textarea>

      <!-- Meta Info -->
      <div class="note-meta-row">
        <span class="meta-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          Last updated {{ note.updatedAt ? (note.updatedAt | date:'MMM d, y h:mm a') : 'just now' }}
        </span>
      </div>

    </main>

    <!-- Assistant Sidebar -->
    <aside class="note-assistant">

      <div class="assistant-header">
        <div class="assistant-status">
          <div class="status-dot"></div>
          <span>AI ASSISTANT</span>
        </div>
        <h3>Note Assistant</h3>
      </div>

      <div class="assistant-actions">
        <button class="action-btn" (click)="aiAssist('Summarize this note in 3 bullet points')"
          [disabled]="isAiLoading">
          <i data-lucide="list" class="action-icon"></i>
          <span>Summarize note</span>
        </button>
        <button class="action-btn" (click)="aiAssist('Explain the key concepts in this note')" [disabled]="isAiLoading">
          <i data-lucide="lightbulb" class="action-icon"></i>
          <span>Explain concepts</span>
        </button>
        <button class="action-btn" (click)="aiAssist('Extract all action items from this note as a list')"
          [disabled]="isAiLoading">
          <i data-lucide="check-square" class="action-icon"></i>
          <span>Extract actions</span>
        </button>
        <button class="action-btn" (click)="aiAssist('Improve the writing quality of this note')"
          [disabled]="isAiLoading">
          <i data-lucide="sparkles" class="action-icon"></i>
          <span>Improve writing</span>
        </button>
      </div>

      <!-- AI Result Display -->
      <div class="ai-result-panel" *ngIf="aiResult">
        <div class="result-header">
          <span>AI INSIGHT</span>
          <button (click)="aiResult = ''" class="close-result">×</button>
        </div>
        <div class="result-content">{{ aiResult }}</div>
        <button class="apply-btn" (click)="applyAiResult()">Apply to Note</button>
      </div>

      <!-- AI Result -->
      <div *ngIf="isAiLoading" class="ai-loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>

      <!-- Ask Input -->
      <div class="assistant-input-row">
        <input type="text" placeholder="Ask about this note..." [(ngModel)]="assistantQuery"
          (keyup.enter)="askAssistant()" class="assistant-input" />
        <button class="ask-btn" (click)="askAssistant()" [disabled]="!assistantQuery.trim() || isAiLoading">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>

    </aside>

  </div>

</div>

<!-- Loading State -->
<ng-template #loading>
  <div class="detail-loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</ng-template>

<!-- Global Delete Modal -->
<div *ngIf="showDeleteConfirm" class="delete-overlay">
  <div class="delete-modal">
    <p>Are you sure you want to delete this note?</p>
    <div class="modal-buttons" *ngIf="!isDeleting">
      <button class="btn-danger" (click)="confirmDelete()">Delete Note</button>
      <button class="btn-ghost" (click)="cancelDelete()">Cancel</button>
    </div>
    <div *ngIf="isDeleting" class="loading-state" style="padding: 10px 0;">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>
</div>
