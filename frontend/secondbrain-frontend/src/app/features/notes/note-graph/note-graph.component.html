<div class="page">
  <h2>Knowledge Graph</h2>

  <p class="hint">
    Click on any node to open and view the corresponding note
  </p>

  <button class="secondary" (click)="resetView()">🔄 Reset View</button>

  <div class="graph-wrapper card">
    <div #graphContainer class="graph-canvas"></div>
  </div>

  <div style="margin-top: 1.5rem; padding: 1rem; background: var(--gray-100); border-radius: var(--radius-md); font-size: 0.875rem; color: var(--gray-600);">
    <strong style="color: var(--gray-700);">💡 Tips:</strong>
    <ul style="margin: 0.5rem 0 0; padding-left: 1.5rem;">
      <li>Drag nodes to rearrange them</li>
      <li>Zoom in/out using your mouse wheel</li>
      <li>Pan around by clicking and dragging on empty space</li>
    </ul>
  </div>
</div>
