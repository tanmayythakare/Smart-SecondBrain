<h2>My Tasks</h2>

<input
  type="text"
  [(ngModel)]="newTaskTitle"
  placeholder="New task"
/>
<button (click)="addTask()">Add</button>
  <ul>
  <li *ngFor="let task of tasks">
    {{ task.title }}
    <button (click)="editTask(task)">Edit</button>
    <button (click)="deleteTask(task)">Delete</button>
  </li>
</ul>
