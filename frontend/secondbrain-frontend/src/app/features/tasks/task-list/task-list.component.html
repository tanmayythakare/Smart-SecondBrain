<div class="page">
  <h2>My Tasks</h2>

  <!-- =====================
       TASK INPUT
       ===================== -->
  <div class="task-input">
    <input
      type="text"
      placeholder="What needs to be done?"
      [(ngModel)]="newTaskTitle"
      (keyup.enter)="addTask()"
    />
    <button (click)="addTask()">Add Task</button>
  </div>

  <!-- =====================
       LOADING STATE
       ===================== -->
  <div *ngIf="isLoading" style="text-align: center; padding: 2rem;">
    <p>Loading tasks...</p>
  </div>

  <!-- =====================
       ERROR STATE
       ===================== -->
  <div *ngIf="!isLoading && errorMessage" style="text-align: center; padding: 2rem; color: red;">
    {{ errorMessage }}
  </div>

  <!-- =====================
       TASK LIST
       ===================== -->
  <ul
    class="task-list"
    *ngIf="!isLoading && !errorMessage && tasks && tasks.length > 0"
  >
    <li *ngFor="let task of tasks" class="task-item card">

      <!-- VIEW MODE -->
      <div
        *ngIf="!isEditing(task)"
        style="display: flex; justify-content: space-between; align-items: center; width: 100%;"
      >
        <span>{{ task.title }}</span>

        <div class="task-actions">
          <button class="secondary" (click)="startEdit(task)">✏️ Edit</button>
          <button class="danger" (click)="toggleDeleteConfirm(task)">🗑️ Delete</button>
        </div>
      </div>

      <!-- EDIT MODE -->
      <div
        *ngIf="isEditing(task)"
        style="display: flex; gap: 0.5rem; align-items: center; width: 100%;"
      >
        <input
          type="text"
          [(ngModel)]="editingTaskTitle"
          [attr.data-task-id]="task.id"
          (keydown)="onEditKeydown($event, task)"
          style="flex: 1; margin: 0; padding: 0.5rem 0.75rem;"
        />
        <button (click)="saveEdit(task)" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
          💾 Save
        </button>
        <button class="secondary" (click)="cancelEdit()" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
          ✕ Cancel
        </button>
      </div>

      <!-- DELETE CONFIRMATION -->
      <div *ngIf="isDeleteConfirmVisible(task)" class="delete-overlay">
        <div class="delete-box">
          <p>⚠️ Delete "{{ task.title }}"?</p>
          <div class="actions">
            <button class="danger" (click)="confirmDelete(task)">Yes, Delete</button>
            <button class="secondary" (click)="cancelDelete()">Cancel</button>
          </div>
        </div>
      </div>

    </li>
  </ul>

  <!-- =====================
       EMPTY STATE
       ===================== -->
  <div
    *ngIf="!isLoading && !errorMessage && (!tasks || tasks.length === 0)"
    style="text-align: center; padding: 3rem; color: var(--gray-400);"
  >
    <p style="font-size: 1.125rem; margin-bottom: 0.5rem;">📋 No tasks yet</p>
    <p style="font-size: 0.875rem; color: var(--gray-500);">
      Add your first task to get started!
    </p>
  </div>
</div>
