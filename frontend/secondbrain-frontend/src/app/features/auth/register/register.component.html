<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-circle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.886 3 3 0 1 0 5.174 3.09" />
        <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.52 5.886 3 3 0 1 1-5.174 3.09" />
        <path d="M12 19V5" />
      </svg>
      </div>
    </div>

    <h2>Join Second Brain</h2>
    <p class="auth-subtitle">Create your personal knowledge engine</p>

    <form (ngSubmit)="onRegister()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="email@example.com" required />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Choose a username" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" 
            placeholder="••••••••" required minlength="6" />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            <i [attr.data-lucide]="showPassword ? 'eye-off' : 'eye'"></i>
          </button>
        </div>
        <small class="input-hint">At least 6 characters</small>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" 
          placeholder="••••••••" required />
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="auth-submit-btn">
        Create Account
      </button>

    </form>

    <div class="auth-footer">
      <span>Already have an account? </span>
      <a routerLink="/auth/login">Sign In</a>
    </div>

  </div>
</div>
